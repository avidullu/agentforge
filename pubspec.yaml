name: agentforge
description: Personal mobile client for Forgejo + local coding agents over Tailscale via MCP.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Networking & storage
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2

  # Deep linking
  app_links: ^6.1.4

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  timeago: ^3.6.1

  # Utils
  collection: ^1.18.0
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
