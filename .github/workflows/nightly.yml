name: Nightly

# ── AgentForge Nightly Android Smoke ──────────────────────────────────
#
# Runs twice daily on the avis-pbook Forgejo act_runner (ubuntu-latest):
#   06:30 UTC (~12:00 IST midday)
#   18:30 UTC (~00:00 IST midnight)
#
# Also triggerable on-demand via workflow_dispatch.
#
# What it does:
#   1. Install + validate Android SDK packages
#   2. Build debug APK
#   3. Run lintDebug
#
# How to check results:
#   https://avis-pbook.tail651ec3.ts.net/avidullu/agentforge/actions
#   → filter by "Nightly" workflow
#   Each run uploads a nightly-result.txt artifact with the full log.
#
# Policy: Android SDK/APK/lint are TOO EXPENSIVE for every PR/push CI
# on a capacity-constrained self-hosted runner. They run HERE only.
# PR CI is quality + Web build-smoke only.
# See: Forgejo issue #17 (AF-018 Android CI policy).

on:
  schedule:
    # 06:30 UTC ~ 12:00 IST (midday)
    - cron: '30 6 * * *'
    # 18:30 UTC ~ 00:00 IST (midnight)
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agentforge-nightly
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.44.6'
  AGENTFORGE_CONFIG: config/agentforge.config.example.json

defaults:
  run:
    shell: bash

jobs:
  android_smoke:
    name: android-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Flutter
        run: bash tool/ci/setup_flutter.sh

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android command-line tools
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          cmdline-tools-version: '14742923'
          accept-android-sdk-licenses: 'true'
          log-accepted-android-sdk-licenses: 'false'
          packages: ''

      # Full Android path: install/validate packages + debug APK + lintDebug.
      - name: Android product steps (local harness)
        id: android-smoke
        run: bash tool/ci/run_local_ci.sh --lane android-smoke

      # ── Visibility: produce a summary artifact for each run ─────────
      # Downloadable from the Actions run page. Issue #17 tracks health.
      - name: Write run summary
        if: always()
        run: |
          {
            echo "AgentForge Nightly android-smoke"
            echo "================================="
            echo "Run:    ${{ github.run_id }}"
            echo "SHA:    ${{ github.sha }}"
            echo "Ref:    ${{ github.ref }}"
            echo "Time:   $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Status: ${{ job.status }}"
            echo ""
            echo "Issue:  https://avis-pbook.tail651ec3.ts.net/avidullu/agentforge/issues/17"
            echo "Logs:   https://avis-pbook.tail651ec3.ts.net/avidullu/agentforge/actions/runs/${{ github.run_id }}"
          } > nightly-result.txt

      - name: Upload run summary artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-result-${{ github.run_id }}-${{ github.run_attempt }}
          path: nightly-result.txt
          retention-days: 90
