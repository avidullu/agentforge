name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# This repository shares a 15 GiB Forgejo runner. Queue runs instead of
# allowing concurrent Gradle/SDK installs to corrupt partial packages or
# exhaust the host. workflow_dispatch provides a real retry button.
concurrency:
  group: agentforge-ci
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.44.6'
  TEST_RANDOM_SEED: '424242'
  LINE_COVERAGE_FLOOR: '35.5'
  DIFF_COVERAGE_FLOOR: '80'
  # Never inherit a persistent runner's private/local config selection.
  AGENTFORGE_CONFIG: config/agentforge.config.example.json

defaults:
  run:
    shell: bash

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          # Forgejo's cache service currently rejects actions/cache auth.
          cache: false

      - name: Runner and revision diagnostics
        run: |
          set -Eeuo pipefail
          printf '[%s] CI event=%s ref=%s sha=%s\n' \
            "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            "${FORGEJO_EVENT_NAME:-${GITHUB_EVENT_NAME:-unknown}}" \
            "${FORGEJO_REF:-${GITHUB_REF:-unknown}}" \
            "$(git rev-parse HEAD)"
          git log --oneline -3
          flutter --version
          dart --version
          git --version
          printf '%s\n' '--- disk ---'
          df -h .
          printf '%s\n' '--- memory ---'
          free -h || true

      - name: Resolve locked dependencies
        run: >-
          bash tool/ci/run_with_heartbeat.sh
          "Flutter dependency resolution" 20 --
          flutter pub get --enforce-lockfile

      - name: Lockfile remains exact
        run: git diff --exit-code -- pubspec.lock

      - name: Generate tracked synthetic config
        run: |
          set -Eeuo pipefail
          printf '[%s] generating synthetic config\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          dart run tool/generate_config.dart
          git diff --exit-code -- lib/core/config/generated/app_config.selected.dart agentforge-config.properties ios/Flutter/AgentForge.xcconfig

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test tool

      - name: Analyze with fatal infos
        run: >-
          bash tool/ci/run_with_heartbeat.sh
          "Flutter static analysis" 20 --
          flutter analyze --no-pub --fatal-infos

      - name: Test randomized with line and branch collection
        run: >-
          bash tool/ci/run_with_heartbeat.sh
          "Flutter randomized test suite" 20 --
          flutter test --no-pub --coverage --branch-coverage
          --test-randomize-ordering-seed=${TEST_RANDOM_SEED}

      - name: Enforce global line-coverage ratchet
        run: >-
          dart run tool/check_coverage.dart
          coverage/lcov.info "${LINE_COVERAGE_FLOOR}"

      - name: Enforce changed-line coverage
        run: |
          set -Eeuo pipefail
          event_name=${FORGEJO_EVENT_NAME:-${GITHUB_EVENT_NAME:-}}
          event_path=${FORGEJO_EVENT_PATH:-${GITHUB_EVENT_PATH:-}}
          base_sha=''
          if [[ -n "$event_path" ]]; then
            base_sha=$(python3 - "$event_path" "$event_name" <<'PY'
          import json
          import sys
          with open(sys.argv[1], encoding="utf-8") as event_file:
              event = json.load(event_file)
          if sys.argv[2] == "pull_request":
              print(event.get("pull_request", {}).get("base", {}).get("sha", ""))
          elif sys.argv[2] == "push":
              print(event.get("before", ""))
          PY
          )
          fi
          if [[ ! $base_sha =~ ^[0-9a-fA-F]{40}$ || $base_sha =~ ^0+$ ]]; then
            base_sha=$(git rev-parse HEAD^)
          fi
          git cat-file -e "${base_sha}^{commit}"
          printf '[%s] diff coverage base=%s head=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" "$base_sha" "$(git rev-parse HEAD)"
          dart run tool/check_diff_coverage.dart coverage/lcov.info "$base_sha" "${DIFF_COVERAGE_FLOOR}"

      - name: PII inventory only (AF-015 fail-closed gate is not active)
        run: dart run tool/check_no_pii.dart --mode=report --scope=tracked

      - name: Validate CI shell scripts
        run: |
          set -Eeuo pipefail
          bash -n tool/ci/run_with_heartbeat.sh
          bash -n tool/ci/test_heartbeat.sh
          bash -n tool/ci/install_android_sdk.sh
          bash -n tool/ci/test_install_android_sdk.sh
          bash tool/ci/test_heartbeat.sh
          bash tool/ci/test_install_android_sdk.sh

      - name: Final repository cleanliness
        run: |
          set -Eeuo pipefail
          git diff --check
          git diff --exit-code
          tracked_status=$(git status --porcelain --untracked-files=no)
          if [[ -n "$tracked_status" ]]; then
            printf '%s\n' "$tracked_status"
            exit 1
          fi
          printf '[%s] quality lane complete and tracked tree clean\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

  build_smoke:
    name: build-smoke
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: false

      - name: Resolve locked dependencies
        run: >-
          bash tool/ci/run_with_heartbeat.sh
          "Build-lane dependency resolution" 20 --
          flutter pub get --enforce-lockfile

      - name: Verify generated config before builds
        run: |
          set -Eeuo pipefail
          dart run tool/generate_config.dart
          git diff --exit-code -- lib/core/config/generated/app_config.selected.dart agentforge-config.properties ios/Flutter/AgentForge.xcconfig

      - name: Build release Web
        run: >-
          bash tool/ci/run_with_heartbeat.sh
          "Flutter release Web build" 20 --
          flutter build web --release --no-wasm-dry-run --no-pub

      - name: Verify Web artifact
        run: |
          set -Eeuo pipefail
          test -s build/web/index.html
          printf '[%s] web index bytes=%s total=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" "$(stat -c '%s' build/web/index.html)" "$(du -sh build/web | cut -f1)"

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android command-line tools
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          cmdline-tools-version: '14742923'
          accept-android-sdk-licenses: 'true'
          log-accepted-android-sdk-licenses: 'false'
          packages: ''

      - name: Install and validate exact Android SDK packages
        run: >-
          bash tool/ci/run_with_heartbeat.sh
          "Android SDK package installation" 30 --
          bash tool/ci/install_android_sdk.sh

      - name: Android toolchain diagnostics
        run: |
          set -Eeuo pipefail
          printf '[%s] java\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          java -version
          printf '[%s] Android SDK root configured (path redacted)\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          df -h "$ANDROID_SDK_ROOT"
          free -h || true

      - name: Build debug Android APK
        run: >-
          bash tool/ci/run_with_heartbeat.sh
          "Flutter debug APK build" 30 --
          flutter build apk --debug --no-pub

      - name: Run Android lint
        run: >-
          bash tool/ci/run_with_heartbeat.sh
          "Android lintDebug" 30 --
          bash -c "cd android &&
          ./gradlew --stop &&
          ./gradlew --no-daemon --console=plain --stacktrace lintDebug"

      - name: Verify Android artifact and clean tree
        run: |
          set -Eeuo pipefail
          apk=build/app/outputs/flutter-apk/app-debug.apk
          test -s "$apk"
          printf '[%s] apk bytes=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" "$(stat -c '%s' "$apk")"
          git diff --check
          git diff --exit-code

  required:
    name: required
    if: ${{ always() }}
    needs: [quality, build_smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Aggregate required CI result
        run: |
          set -Eeuo pipefail
          quality='${{ needs.quality.result }}'
          build_smoke='${{ needs.build_smoke.result }}'
          printf '[%s] quality=%s build-smoke=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" "$quality" "$build_smoke"
          [[ "$quality" == success ]]
          [[ "$build_smoke" == success ]]
