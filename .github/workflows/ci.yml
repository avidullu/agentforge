name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Fast gate: formatting + static analysis — fails before the expensive
  # jobs run. Catches the most common issues in ~1 min.
  # ------------------------------------------------------------------
  lint-and-analyze:
    name: Format + analyze (fast gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.44.6'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test tool
      - name: Static analysis
        run: flutter analyze --fatal-infos

  # ------------------------------------------------------------------
  # Full suite: config gen, tests + coverage floor, PII guard, builds.
  # Only runs if the fast gate is green.
  # ------------------------------------------------------------------
  test-and-build:
    name: Test + coverage + PII guard + builds
    needs: lint-and-analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK 36
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: >-
            platform-tools platforms;android-36 build-tools;36.0.0

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.44.6'
          # Disable actions/cache: runner has intermittent Invalid username/token
          # when fetching github.com/actions/cache (PR #3 review 260; PR #7 runs
          # 37/38 failed at ~5m before any repo checks). Prefer download over red CI.
          cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Generate config (tracked synthetic)
        run: dart run tool/generate_config.dart

      # Prevent "generate then rewrite" from masking stale/private committed gens.
      - name: Generated tracked outputs match HEAD
        run: |
          git diff --exit-code -- \
            lib/core/config/generated/app_config.selected.dart \
            agentforge-config.properties \
            ios/Flutter/AgentForge.xcconfig

      - name: Run tests with coverage
        run: dart run tool/run_all_tests.dart

      - name: PII guard (report-only on real tree; never fail-closed here)
        run: dart run tool/check_no_pii.dart --mode=report --scope=tracked
        # Fail-closed full-tree blocklist is AF-015 / S7 only (docs/11 §8.0).

      - name: Build Android debug APK
        run: flutter build apk --debug

      - name: Build web release
        run: flutter build web --release --no-wasm-dry-run
