name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# This repository shares a 15 GiB Forgejo runner. Queue runs instead of
# allowing concurrent Gradle/SDK installs to corrupt partial packages or
# exhaust the host. workflow_dispatch provides a real retry button.
concurrency:
  group: agentforge-ci
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.44.6'
  TEST_RANDOM_SEED: '424242'
  LINE_COVERAGE_FLOOR: '35.5'
  DIFF_COVERAGE_FLOOR: '80'
  # Never inherit a persistent runner's private/local config selection.
  AGENTFORGE_CONFIG: config/agentforge.config.example.json

defaults:
  run:
    shell: bash

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          # Forgejo's cache service currently rejects actions/cache auth.
          cache: false

      # Single source of truth: same script developers run locally.
      # Debug reds with: bash tool/ci/run_local_ci.sh --lane quality
      - name: Quality product steps (local harness)
        run: bash tool/ci/run_local_ci.sh --lane quality

  # Web-only. Android SDK install + APK + lint live in nightly.yml (see AF-018 bug).
  build_smoke:
    name: build-smoke
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: false

      - name: Build-smoke product steps (web only; no Android SDK)
        run: bash tool/ci/run_local_ci.sh --lane build-smoke

  required:
    name: required
    if: ${{ always() }}
    needs: [quality, build_smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Aggregate required CI result
        run: |
          set -Eeuo pipefail
          quality='${{ needs.quality.result }}'
          build_smoke='${{ needs.build_smoke.result }}'
          printf '[%s] quality=%s build-smoke=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" "$quality" "$build_smoke"
          [[ "$quality" == success ]]
          [[ "$build_smoke" == success ]]
